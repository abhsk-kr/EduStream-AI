version: "1"

services:
  # 1. Python AI Backend (FastAPI)
  - type: web
    name: edustream-ai-service
    env: python
    rootDir: ai-service
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false

  # 2. Node.js Express Backend
  - type: web
    name: edustream-api
    env: node
    rootDir: server
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_VERSION
        value: 20.10.0
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: edustream-ai-service
          envVarKey: RENDER_EXTERNAL_URL

  # 3. React Frontend (Static)
  - type: web
    name: edustream-client
    env: static
    rootDir: client
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: NODE_VERSION
        value: 20.10.0
      - key: VITE_API_URL
        fromService:
          type: web
          name: edustream-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
